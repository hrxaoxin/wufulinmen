        // 智能合约地址
        const tokenContractAddress = '0xbF63b623DA9bA4Fb4af24C7D9E5A373Fb127fffF'; // 代币合约地址
        const testContractAddress = '0xYOUR_TEST_CONTRACT_ADDRESS'; // 测试合约地址（部署后填写）

        // 全局变量
        let web3 = null;
        let tokenContract = null;
        let testContract = null;
        let accounts = [];
        const BURN_AMOUNT = 8888; // 销毁金额：8888枚代币

        // DOM元素
        const walletAddress = document.getElementById('walletAddress');
        const tokenBalance = document.getElementById('tokenBalance');
        const burnAmount = document.getElementById('burnAmount');
        const approvalStatus = document.getElementById('approvalStatus');
        const refreshWallet = document.getElementById('refreshWallet');
        const approveToken = document.getElementById('approveToken');
        const testBurnToken = document.getElementById('testBurnToken');
        const checkBalance = document.getElementById('checkBalance');
        const testResult = document.getElementById('testResult');
        const successModal = document.getElementById('successModal');
        const modalMessage = document.getElementById('modalMessage');
        const closeModal = document.getElementById('closeModal');

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            connectWallet();
        });

        // 连接钱包
        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                web3 = new Web3(window.ethereum);
                try {
                    accounts = await web3.eth.requestAccounts();
                    const address = accounts[0];
                    const shortAddress = address.substring(0, 4) + '...' + address.substring(address.length - 4);
                    walletAddress.textContent = shortAddress;
                    
                    // 初始化合约
                    tokenContract = new web3.eth.Contract(tokenABI, tokenContractAddress);
                    testContract = new web3.eth.Contract(testContractABI, testContractAddress);
                    
                    await updateTokenBalance();
                    await checkApprovalStatus();
                } catch (error) {
                    console.error('连接钱包失败:', error);
                    testResult.textContent = '连接钱包失败: ' + error.message;
                }
            } else {
                alert('请安装MetaMask等Web3钱包插件');
            }
        }

        // 更新代币余额
        async function updateTokenBalance() {
            try {
                if (web3 && tokenContract && accounts.length > 0) {
                    // 查询用户的代币余额
                    const balance = await tokenContract.methods.balanceOf(accounts[0]).call();
                    
                    // 查询代币的小数位数
                    let decimals = 18; // 默认值
                    try {
                        decimals = await tokenContract.methods.decimals().call();
                    } catch (e) {
                        console.log('无法获取代币小数位数，使用默认值18');
                    }
                    
                    // 将余额转换为枚
                    const balanceInTokens = web3.utils.fromWei(balance, 'ether');
                    const balanceInt = Math.floor(parseFloat(balanceInTokens));
                    tokenBalance.textContent = balanceInt;
                    
                    console.log('代币余额:', balance, '单位 =', balanceInt, '枚');
                }
            } catch (error) {
                console.error('获取余额失败:', error);
                tokenBalance.textContent = '0';
                testResult.textContent = '获取余额失败: ' + error.message;
            }
        }

        // 检查授权状态
        async function checkApprovalStatus() {
            try {
                if (web3 && tokenContract && accounts.length > 0) {
                    const amountInWei = web3.utils.toWei(BURN_AMOUNT.toString(), 'ether');
                    const allowance = await tokenContract.methods.allowance(accounts[0], testContractAddress).call();
                    const isApproved = allowance >= amountInWei;
                    
                    if (isApproved) {
                        approvalStatus.textContent = '已授权';
                        approvalStatus.style.color = '#4CAF50';
                    } else {
                        approvalStatus.textContent = '未授权';
                        approvalStatus.style.color = '#f44336';
                    }
                }
            } catch (error) {
                console.error('检查授权状态失败:', error);
                approvalStatus.textContent = '检查失败';
                approvalStatus.style.color = '#ff9800';
            }
        }

        // 刷新钱包
        refreshWallet.addEventListener('click', function() {
            connectWallet();
        });

        // 授权代币函数
        approveToken.addEventListener('click', async function() {
            if (!web3 || !tokenContract || accounts.length === 0) {
                alert('请先连接钱包');
                return;
            }

            try {
                // 获取代币余额
                const balanceStr = tokenBalance.textContent || '0';
                const balance = parseInt(balanceStr);
                
                if (balance < BURN_AMOUNT) {
                    alert('代币余额不足，需要8888枚代币');
                    return;
                }
            } catch (error) {
                console.error('检查余额失败:', error);
                alert('检查余额失败，请刷新页面重试');
                return;
            }

            try {
                approveToken.textContent = '授权中...';
                approveToken.disabled = true;

                // 使用Web3.js的toWei方法，避免科学计数法问题
                const amountInWei = web3.utils.toWei(BURN_AMOUNT.toString(), 'ether');
                
                // 设置合理的Gas价格和上限
                const gasPrice = web3.utils.toWei('5', 'gwei'); // 5 gwei
                const gasLimit = 1000000; // 1,000,000 gas
                
                console.log('正在授权智能合约使用代币...');
                console.log('授权数量:', BURN_AMOUNT, '枚 =', amountInWei, 'wei');
                
                // 显示授权提示
                alert('即将授权智能合约使用8888枚代币\n\n这是正常的测试流程，用于测试代币销毁功能\n\n请在MetaMask中确认授权交易');
                
                await tokenContract.methods.approve(testContractAddress, amountInWei).send({ 
                    from: accounts[0],
                    gasPrice: gasPrice,
                    gas: gasLimit
                });

                approveToken.disabled = false;

                console.error('授权失败:', error);
                approveToken.textContent = '授权代币';
                approveToken.disabled = false;
                
                let errorMsg = '授权失败，请重试';
                if (error.message) {
                    errorMsg += '\n错误信息: ' + error.message;
                }
                alert(errorMsg);
            }
        });

        // 测试销毁代币
        testBurnToken.addEventListener('click', async function() {
            if (!web3 || !testContract || accounts.length === 0) {
                alert('请先连接钱包');
                return;
            }

            try {
                // 检查授权状态
                const amountInWei = web3.utils.toWei(BURN_AMOUNT.toString(), 'ether');
                const allowance = await tokenContract.methods.allowance(accounts[0], testContractAddress).call();
                
                if (allowance < amountInWei) {
                    alert('请先授权代币后再测试');
                    return;
                }

                // 获取代币余额
                const balanceStr = tokenBalance.textContent || '0';
                const balance = parseInt(balanceStr);
                
                if (balance < BURN_AMOUNT) {
                    alert('代币余额不足，需要8888枚代币');
                    return;
                }
            } catch (error) {
                console.error('检查条件失败:', error);
                alert('检查条件失败，请刷新页面重试');
                return;
            }

            try {
                testBurnToken.textContent = '测试中...';
                testBurnToken.disabled = true;

                // 设置合理的Gas价格和上限
                const gasPrice = web3.utils.toWei('5', 'gwei'); // 5 gwei
                const gasLimit = 2000000; // 2,000,000 gas
                
                // 显示测试提示
                alert('即将开始测试代币销毁功能\n\n系统将自动销毁8888枚代币\n\n请在MetaMask中确认测试交易');
                
                console.log('正在测试代币销毁功能...');
                
                // 调用智能合约测试销毁代币
                const result = await testContract.methods.testBurnToken().send({ 
                    from: accounts[0],
                    gasPrice: gasPrice,
                    gas: gasLimit
                });
                console.log('代币销毁测试成功', result);
                
                // 更新余额
                await updateTokenBalance();
                
                // 显示成功弹窗
                modalMessage.textContent = '代币销毁测试成功！';
                successModal.classList.remove('hidden');
                
                // 更新测试结果
                testResult.innerHTML = `
                    <div class="p-4 bg-green-50 rounded-lg">
                        <h4 class="font-semibold text-green-800 mb-2">测试成功！</h4>
                        <p class="text-green-700">代币销毁功能正常工作</p>
                        <p class="text-sm text-green-600 mt-2">销毁金额: 8888 代币</p>
                        <p class="text-sm text-green-600">销毁地址: 0x000000000000000000000000000000000000dEaD</p>
                    </div>
                `;
                
                // 恢复按钮状态
                testBurnToken.textContent = '测试销毁代币';
                testBurnToken.disabled = false;
            } catch (error) {
                console.error('测试失败:', error);
                testBurnToken.textContent = '测试销毁代币';
                testBurnToken.disabled = false;
                
                // 分析错误原因，提供更详细的错误信息
                let errorMsg = '测试失败，请重试';
                
                if (error.message) {
                    if (error.message.includes('Insufficient token balance')) {
                        errorMsg = '代币余额不足，需要8888枚代币';
                    } else if (error.message.includes('Insufficient token allowance')) {
                        errorMsg = '代币授权不足，请先授权智能合约使用代币';
                    } else if (error.message.includes('Token transfer to burn address failed')) {
                        errorMsg = '代币转移失败，请检查代币合约状态';
                    } else {
                        errorMsg += '\n错误信息: ' + error.message;
                    }
                }
                
                console.log('错误分析:', errorMsg);
                alert(errorMsg);
                
                // 更新测试结果
                testResult.innerHTML = `
                    <div class="p-4 bg-red-50 rounded-lg">
                        <h4 class="font-semibold text-red-800 mb-2">测试失败</h4>
                        <p class="text-red-700">${errorMsg}</p>
                    </div>
                `;
            }
        });

        // 检查余额
        checkBalance.addEventListener('click', async function() {
            if (!web3 || !tokenContract || accounts.length === 0) {
                alert('请先连接钱包');
                return;
            }

            try {
                checkBalance.textContent = '检查中...';
                checkBalance.disabled = true;

                // 更新代币余额
                await updateTokenBalance();
                
                // 检查授权状态
                await checkApprovalStatus();
                
                // 显示成功弹窗
                modalMessage.textContent = '余额检查完成！';
                successModal.classList.remove('hidden');
                
                // 恢复按钮状态
                checkBalance.textContent = '检查余额';
                checkBalance.disabled = false;
            } catch (error) {
                console.error('检查余额失败:', error);
                checkBalance.textContent = '检查余额';
                checkBalance.disabled = false;
                alert('检查余额失败，请重试');
            }
        });

        // 关闭弹窗
        closeModal.addEventListener('click', function() {
            successModal.classList.add('hidden');
        });

        // 粒子背景初始化
        particlesJS('particles-js', {
            particles: {
                number: {
                    value: 80,
                    density: {
                        enable: true,
                        value_area: 800
                    }
                },
                color: {
                    value: '#ff6b6b'
                },
                shape: {
                    type: 'circle',
                    stroke: {
                        width: 0,
                        color: '#000000'
                    }
                },
                opacity: {
                    value: 0.5,
                    random: false,
                    anim: {
                        enable: false
                    }
                },
                size: {
                    value: 3,
                    random: true,
                    anim: {
                        enable: false
                    }
                },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: '#ff6b6b',
                    opacity: 0.4,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 6,
                    direction: 'none',
                    random: false,
                    straight: false,
                    out_mode: 'out',
                    bounce: false
                }
            },
            interactivity: {
                detect_on: 'canvas',
                events: {
                    onhover: {
                        enable: true,
                        mode: 'grab'
                    },
                    onclick: {
                        enable: true,
                        mode: 'push'
                    },
                    resize: true
                },
                modes: {
                    grab: {
                        distance: 140,
                        line_linked: {
                            opacity: 1
                        }
                    },
                    push: {
                        particles_nb: 4
                    }
                }
            },
            retina_detect: true
        });
    </script>
</body>
