        // 连接钱包
        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                web3 = new Web3(window.ethereum);
                try {
                    accounts = await web3.eth.requestAccounts();
                    const address = accounts[0];
                    const shortAddress = address.substring(0, 4) + '...' + address.substring(address.length - 4);
                    walletAddress.textContent = shortAddress;
                    
                    // 初始化合约
                    contract = new web3.eth.Contract(contractABI, contractAddress);
                    
                    await updateStats();
                    await loadMyCards();
                } catch (error) {
                    console.error('连接钱包失败:', error);
                }
            } else {
                alert('请安装MetaMask等Web3钱包插件');
            }
        }

        // 更新统计信息
        async function updateStats() {
            try {
                if (web3 && contract) {
                    // 获取总卡数
                    const total = await contract.methods.getTotalCards().call();
                    totalCards.textContent = total;
                    
                    // 获取我的卡数
                    if (accounts.length > 0) {
                        const balance = await contract.methods.balanceOf(accounts[0]).call();
                        myCards.textContent = balance;
                    }
                }
            } catch (error) {
                console.error('更新统计信息失败:', error);
            }
        }

        // 加载我的卡片
        async function loadMyCards() {
            try {
                if (web3 && contract && accounts.length > 0) {
                    const balance = await contract.methods.balanceOf(accounts[0]).call();
                    
                    if (parseInt(balance) > 0) {
                        mintResults.innerHTML = '';
                        
                        // 简单显示最近铸造的卡片
                        const total = await contract.methods.getTotalCards().call();
                        const startId = Math.max(1, parseInt(total) - 10);
                        
                        for (let i = startId; i <= parseInt(total); i++) {
                            const cardInfo = await contract.methods.cards(i).call();
                            if (cardInfo.owner.toLowerCase() === accounts[0].toLowerCase()) {
                                await displayCard(i);
                            }
                        }
                    } else {
                        mintResults.innerHTML = `
                            <div class="text-center text-gray-500 py-8">
                                <i class="fas fa-gift text-4xl mb-2"></i>
                                <p>还没有铸造卡片</p>
                            </div>
                        `;
                    }
                }
            } catch (error) {
                console.error('加载卡片失败:', error);
            }
        }

        // 显示卡片
        async function displayCard(cardId) {
            try {
                const cardInfo = await contract.methods.cards(cardId).call();
                const metadata = await contract.methods.cardMetadata(cardInfo.cardType).call();
                
                const cardElement = document.createElement('div');
                cardElement.className = 'card-item';
                cardElement.innerHTML = `
                    <img src="${metadata.image}" alt="${metadata.name}" class="card-image">
                    <div class="p-3">
                        <h4 class="font-bold text-gray-800">${metadata.name}</h4>
                        <p class="text-sm text-gray-500 mb-2">ID: ${cardId}</p>
                        <p class="text-xs text-gray-400">
                            ${new Date(parseInt(cardInfo.mintTime) * 1000).toLocaleString()}
                        </p>
                    </div>
                `;
                
                mintResults.appendChild(cardElement);
            } catch (error) {
                console.error('显示卡片失败:', error);
            }
        }

        // 单个铸造
        mintSingle.addEventListener('click', async function() {
            if (!web3 || !contract || accounts.length === 0) {
                alert('请先连接钱包');
                return;
            }

            try {
                mintSingle.textContent = '铸造中...';
                mintSingle.disabled = true;

                // 调用智能合约铸造
                const result = await contract.methods.mintRandomCard().send({ from: accounts[0] });
                const cardId = result.events.CardMinted.returnValues.cardId;
                const cardType = result.events.CardMinted.returnValues.cardType;
                
                console.log('铸造成功:', cardId, cardType);
                
                // 获取卡片信息
                const metadata = await contract.methods.cardMetadata(cardType).call();
                
                // 显示成功弹窗
                document.getElementById('cardName').textContent = metadata.name;
                document.getElementById('cardType').textContent = `类型: ${blessingTypeNames[cardType]}`;
                document.getElementById('cardDescription').textContent = `成功铸造了一张${metadata.name}，ID: ${cardId}`;
                document.getElementById('cardImage').querySelector('img').src = metadata.image;
                mintSuccessModal.classList.remove('hidden');
                
                // 更新统计和卡片
                await updateStats();
                await loadMyCards();
                
                mintSingle.textContent = '随机铸造1张';
                mintSingle.disabled = false;
            } catch (error) {
                console.error('铸造失败:', error);
                mintSingle.textContent = '随机铸造1张';
                mintSingle.disabled = false;
                alert('铸造失败，请重试');
            }
        });

        // 批量铸造
        mintBatch.addEventListener('click', async function() {
            if (!web3 || !contract || accounts.length === 0) {
                alert('请先连接钱包');
                return;
            }

            const count = parseInt(batchCount.value);
            if (count < 1 || count > 10) {
                alert('铸造数量必须在1-10之间');
                return;
            }

            try {
                mintBatch.textContent = '铸造中...';
                mintBatch.disabled = true;

                // 调用智能合约批量铸造
                await contract.methods.mintBatch(count).send({ from: accounts[0] });
                
                console.log('批量铸造成功:', count, '张');
                
                // 更新统计和卡片
                await updateStats();
                await loadMyCards();
                
                alert(`成功铸造了${count}张福卡！`);
                
                mintBatch.textContent = '批量铸造';
                mintBatch.disabled = false;
            } catch (error) {
                console.error('批量铸造失败:', error);
                mintBatch.textContent = '批量铸造';
                mintBatch.disabled = false;
                alert('批量铸造失败，请重试');
            }
        });

        // 重置测试
        resetTest.addEventListener('click', async function() {
            if (!web3 || !contract || accounts.length === 0) {
                alert('请先连接钱包');
                return;
            }

            if (!confirm('确定要重置测试吗？这将重置计数器，但不会删除已铸造的NFT。')) {
                return;
            }

            try {
                resetTest.textContent = '重置中...';
                resetTest.disabled = true;

                // 调用智能合约重置
                await contract.methods.reset().send({ from: accounts[0] });
                
                console.log('重置成功');
                
                // 更新统计和卡片
                await updateStats();
                await loadMyCards();
                
                alert('测试已重置！');
                
                resetTest.textContent = '重置测试（仅管理员）';
                resetTest.disabled = false;
            } catch (error) {
                console.error('重置失败:', error);
                resetTest.textContent = '重置测试（仅管理员）';
                resetTest.disabled = false;
                alert('重置失败，请检查是否为管理员');
            }
        });

        // 刷新钱包
        refreshWallet.addEventListener('click', function() {
            connectWallet();
        });

        // 取消弹窗
        cancelModal.addEventListener('click', function() {
            mintSuccessModal.classList.add('hidden');
        });

        // 查看结果
        viewResults.addEventListener('click', function() {
            mintSuccessModal.classList.add('hidden');
            loadMyCards();
        });
    </script>
</body>
</html>
