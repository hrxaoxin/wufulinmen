        // 智能合约地址
        const contractAddress = '0xB573391c06A59Ec843D2b53c966fD39fD945BB3d'; // 代理合约地址

        // 全局变量
        let web3;
        let contract;
        let account;

        // DOM元素
        const claimAllBtn = document.getElementById('claimAllBtn');
        const bnbReward = document.getElementById('bnbReward');

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initWeb3().then(() => {
                loadBNBReward();
            });
        });

        // 初始化Web3
        async function initWeb3() {
            return new Promise((resolve, reject) => {
                if (typeof window.ethereum !== 'undefined') {
                    web3 = new Web3(window.ethereum);
                    try {
                        // 请求账户访问
                        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                        account = accounts[0];
                        
                        // 初始化合约
                        contract = new web3.eth.Contract(contractABI, contractAddress);
                        
                        console.log('钱包连接成功:', account);
                        resolve(account);
                    } catch (error) {
                        console.error('初始化Web3失败:', error);
                        resolve(null);
                    }
                } else {
                    alert('请安装MetaMask等Web3钱包插件');
                    resolve(null);
                }
            });
        }

        // 加载BNB奖励
        async function loadBNBReward() {
            try {
                if (!contract || !account) {
                    return;
                }
                
                // 从智能合约获取用户分红余额
                const dividendBalance = await contract.methods.userDividendBalance(account).call();
                
                // 转换为BNB单位
                const bnbAmount = web3.utils.fromWei(dividendBalance, 'ether');
                
                // 更新显示
                bnbReward.textContent = bnbAmount.substring(0, 6) + ' BNB';
            } catch (error) {
                console.error('获取BNB奖励失败:', error);
                bnbReward.textContent = '0.0000 BNB';
            }
        }

        // 一键领取所有BNB
        claimAllBtn.addEventListener('click', async function() {
            if (!contract || !account) {
                alert('请先连接钱包');
                return;
            }

            try {
                // 显示领取中状态
                claimAllBtn.textContent = '领取中...';
                claimAllBtn.disabled = true;

                // 调用智能合约的领取分红方法
                await contract.methods.claimDividend().send({ from: account });

                // 领取成功
                claimAllBtn.textContent = '已领取';
                alert('领取成功！BNB已发送到您的钱包');

                // 重新加载数据
                await loadBNBReward();
            } catch (error) {
                console.error('领取失败:', error);
                claimAllBtn.textContent = '一键领取所有BNB';
                claimAllBtn.disabled = false;
                alert('领取失败，请重试');
            }
        });
    </script>
