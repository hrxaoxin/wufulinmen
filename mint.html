        let accounts = [];
        const MINT_PRICE = 8888; // 铸造价格：8888枚代币

        // DOM元素
        const walletAddress = document.getElementById('walletAddress');
        const tokenBalance = document.getElementById('tokenBalance');
        const mintCount = document.getElementById('mintCount');
        const refreshWallet = document.getElementById('refreshWallet');
        const startMint = document.getElementById('startMint');
        const mintSuccessModal = document.getElementById('mintSuccessModal');
        const cancelModal = document.getElementById('cancelModal');
        const viewCollection = document.getElementById('viewCollection');

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            connectWallet();
            updateMintCount();
        });

        // 连接钱包
        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                web3 = new Web3(window.ethereum);
                try {
                    accounts = await web3.eth.requestAccounts();
                    const address = accounts[0];
                    const shortAddress = address.substring(0, 4) + '...' + address.substring(address.length - 4);
                    walletAddress.textContent = shortAddress;
                    
                    // 初始化合约
                    contract = new web3.eth.Contract(contractABI, contractAddress);
                    tokenContract = new web3.eth.Contract(tokenABI, tokenContractAddress);
                    
                    await updateTokenBalance();
                } catch (error) {
                    console.error('连接钱包失败:', error);
                }
            } else {
                alert('请安装MetaMask等Web3钱包插件');
            }
        }

        // 更新代币余额
        async function updateTokenBalance() {
            try {
                if (web3 && tokenContract && accounts.length > 0) {
                    // 查询用户的代币余额
                    const balance = await tokenContract.methods.balanceOf(accounts[0]).call();
                    
                    // 查询代币的小数位数
                    let decimals = 18; // 默认值
                    try {
                        decimals = await tokenContract.methods.decimals().call();
                    } catch (e) {
                        console.log('无法获取代币小数位数，使用默认值18');
                    }
                    
                    // 将余额转换为枚
                    // 使用Web3.js的fromWei方法，避免精度问题
                    const balanceInTokens = web3.utils.fromWei(balance, 'ether');
                    
                    // 显示为整数
                    const balanceInt = Math.floor(parseFloat(balanceInTokens));
                    tokenBalance.textContent = balanceInt;
                    
                    console.log('代币余额:', balance, '单位 =', balanceInt, '枚');
                    console.log('代币余额(原始):', balanceInTokens, '枚');
                    console.log('代币小数位数:', decimals);
                }
            } catch (error) {
                console.error('获取余额失败:', error);
                tokenBalance.textContent = '0';
            }
            updateMintCount();
        }

        // 更新可铸造次数
        function updateMintCount() {
            try {
                if (web3 && accounts.length > 0) {
                    // 获取代币余额
                    const balanceStr = tokenBalance.textContent || '0';
                    const balance = parseInt(balanceStr);
                    
                    // 计算可铸造次数（向下取整）
                    const count = Math.floor(balance / MINT_PRICE);
                    mintCount.textContent = count;
                } else {
                    mintCount.textContent = '0';
                }
            } catch (error) {
                console.error('计算可铸造次数失败:', error);
                mintCount.textContent = '0';
            }
        }

        // 刷新钱包
        refreshWallet.addEventListener('click', function() {

        let isApproved = false;

        // 检查授权状态
        async function checkApprovalStatus() {
            try {
                if (web3 && tokenContract && accounts.length > 0) {
                    const amountInWei = web3.utils.toWei(MINT_PRICE.toString(), 'ether');
                    const allowance = await tokenContract.methods.allowance(accounts[0], contractAddress).call();
                    isApproved = allowance >= amountInWei;
                    
                    if (isApproved) {
                        approveButton.textContent = '已授权';
                        approveButton.disabled = true;
                        approveButton.style.backgroundColor = '#4CAF50';
                        approveButton.style.color = 'white';
                    } else {
                        approveButton.textContent = '授权代币';
                        approveButton.disabled = false;
                        approveButton.style.backgroundColor = '';
                        approveButton.style.color = '';
                    }
                }
            } catch (error) {
                console.error('检查授权状态失败:', error);
            }
        }

        // 授权代币函数
        approveButton.addEventListener('click', async function() {
            if (!web3 || !tokenContract || accounts.length === 0) {
                alert('请先连接钱包');
                return;
            }

            try {
                // 获取代币余额
                const balanceStr = tokenBalance.textContent || '0';
                const balance = parseInt(balanceStr);
                
                if (balance < MINT_PRICE) {
                    alert('代币余额不足，需要8888枚代币');
                    return;
                }
            } catch (error) {
                console.error('检查余额失败:', error);
                alert('检查余额失败，请刷新页面重试');
                return;
            }

            try {
                approveButton.textContent = '授权中...';
                approveButton.disabled = true;

                // 使用Web3.js的toWei方法，避免科学计数法问题
                const amountInWei = web3.utils.toWei(MINT_PRICE.toString(), 'ether');
                
                // 设置合理的Gas价格和上限
                // 使用动态Gas价格，根据网络状况自动调整
                const gasPrice = await web3.eth.getGasPrice();
                // 增加20%的Gas价格以提高交易优先级
                const adjustedGasPrice = Math.floor(parseInt(gasPrice) * 1.2);
                const gasLimit = 1000000; // 1,000,000 gas
                
                console.log('当前网络Gas价格:', gasPrice, 'wei');
                console.log('调整后的Gas价格:', adjustedGasPrice, 'wei');
                
                console.log('正在授权智能合约使用代币...');
                console.log('授权数量:', MINT_PRICE, '枚 =', amountInWei, 'wei');
                console.log('设置Gas价格:', gasPrice, 'wei');
                console.log('设置Gas上限:', gasLimit);
                
                // 显示授权提示
                alert('即将授权智能合约使用8888枚代币\n\n这是正常的铸造流程，用于支付铸造费用\n\n请在MetaMask中确认授权交易');
                
                await tokenContract.methods.approve(contractAddress, amountInWei).send({ 
                    from: accounts[0],
                    gasPrice: adjustedGasPrice,
                    gas: gasLimit
                });
                
                console.log('代币授权成功');
                alert('代币授权成功！现在可以开始铸造了');
                
                // 更新授权状态
                await checkApprovalStatus();
            } catch (error) {
                console.error('授权失败:', error);
                approveButton.textContent = '授权代币';
                approveButton.disabled = false;
                
                let errorMsg = '授权失败，请重试';
                if (error.message) {
                    errorMsg += '\n错误信息: ' + error.message;
                }
                alert(errorMsg);
            }
        });

        // 两步铸造流程
        // DOM元素
        const burnTokenBtn = document.getElementById('burnTokenBtn');
        const mintAfterBurnBtn = document.getElementById('mintAfterBurnBtn');
        const mintStatus = document.getElementById('mintStatus');

        // 检查用户是否已销毁代币
        async function checkBurnStatus() {
            try {
                if (web3 && contract && accounts.length > 0) {
                    const hasBurned = await contract.methods.hasBurnedToken(accounts[0]).call();
                    return hasBurned;
                }
                return false;
            } catch (error) {
                console.error('检查销毁状态失败:', error);
                return false;
            }
        }

        // 更新铸造状态
        async function updateMintStatus() {
            const hasBurned = await checkBurnStatus();
            if (hasBurned) {
                mintAfterBurnBtn.disabled = false;
                mintStatus.innerHTML = '<p class="text-green-700">✓ 已完成代币销毁，可以开始铸造NFT</p>';
            } else {
                mintAfterBurnBtn.disabled = true;
                mintStatus.innerHTML = '<p class="text-yellow-700">请先完成第一步：销毁代币</p>';
            }
        }

        // 第一步：销毁代币
        burnTokenBtn.addEventListener('click', async function() {
            console.log('点击了销毁代币按钮');
            
            // 添加视觉反馈
            burnTokenBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 处理中...';
            burnTokenBtn.disabled = true;

            try {
                // 检查钱包连接
                if (!web3 || !contract || !tokenContract || accounts.length === 0) {
                    console.log('钱包未连接，尝试连接...');
                    await connectWallet();
                    
                    // 再次检查连接状态
                    if (!web3 || !contract || !tokenContract || accounts.length === 0) {
                        alert('请先连接钱包');
                        burnTokenBtn.innerHTML = '<i class="fas fa-fire mr-2"></i> 第一步：销毁代币';
                        burnTokenBtn.disabled = false;
                        return;
                    }
                }

                console.log('钱包已连接，检查授权状态...');
                
                // 检查授权状态
                const amountInWei = web3.utils.toWei(MINT_PRICE.toString(), 'ether');
                const allowance = await tokenContract.methods.allowance(accounts[0], contractAddress).call();
                
                console.log('授权检查详情:', {
                    userAddress: accounts[0],
                    contractAddress: contractAddress,
                    requiredAmount: MINT_PRICE,
                    requiredAmountInWei: amountInWei,
                    currentAllowance: allowance,
                    isSufficient: allowance >= amountInWei
                });
                
                if (allowance < amountInWei) {
                    alert('请先授权代币后再销毁');
                    burnTokenBtn.innerHTML = '<i class="fas fa-fire mr-2"></i> 第一步：销毁代币';
                    burnTokenBtn.disabled = false;
                    return;
                }

                console.log('授权检查通过，检查代币余额...');
                
                // 获取代币余额
                const balanceStr = tokenBalance.textContent || '0';
                const balance = parseInt(balanceStr);
                
                console.log('余额检查详情:', {
                    currentBalance: balance,
                    requiredBalance: MINT_PRICE,
                    isSufficient: balance >= MINT_PRICE
                });
                
                if (balance < MINT_PRICE) {
                    alert(`代币余额不足，需要${MINT_PRICE}枚代币，当前余额为${balance}枚`);
                    burnTokenBtn.innerHTML = '<i class="fas fa-fire mr-2"></i> 第一步：销毁代币';
                    burnTokenBtn.disabled = false;
                    return;
                }

                console.log('余额检查通过，准备销毁代币...');
                
                // 设置合理的Gas价格和上限
                const gasPrice = await web3.eth.getGasPrice();
                const adjustedGasPrice = Math.floor(parseInt(gasPrice) * 1.2);
                const gasLimit = 1000000; // 1,000,000 gas
                
                console.log('当前网络Gas价格:', gasPrice, 'wei');
                console.log('调整后的Gas价格:', adjustedGasPrice, 'wei');
                
                // 显示销毁提示
                alert('即将销毁8888枚代币作为铸造费用\n\n请在MetaMask中确认销毁交易');
                
                console.log('正在销毁代币...');
                
                // 调用智能合约销毁代币
                console.log('开始调用burnTokenForMint()函数...');
                try {
                    await contract.methods.burnTokenForMint().send({ 
                        from: accounts[0],
                        gasPrice: adjustedGasPrice,
                        gas: gasLimit
                    });
                    console.log('代币销毁成功');
                } catch (error) {
                    console.error('代币销毁失败:', error);
                    // 显示详细的错误信息给用户
                    let errorMessage = '销毁代币失败';
                    if (error.message) {
                        errorMessage += ': ' + error.message;
                    } else if (error.reason) {
                        errorMessage += ': ' + error.reason;
                    }
                    alert(errorMessage);
                    return;
                }
                
                // 更新铸造状态
                await updateMintStatus();
                
                // 更新余额
                await updateTokenBalance();
                
                // 显示成功提示
                alert('代币销毁成功！现在可以开始铸造NFT了');
                
                // 恢复按钮状态
                burnTokenBtn.innerHTML = '<i class="fas fa-fire mr-2"></i> 第一步：销毁代币';
                burnTokenBtn.disabled = false;
            } catch (error) {
                console.error('销毁代币失败:', error);
                
                // 恢复按钮状态
                burnTokenBtn.innerHTML = '<i class="fas fa-fire mr-2"></i> 第一步：销毁代币';
                burnTokenBtn.disabled = false;
                
                // 分析错误原因，提供更详细的错误信息
                let errorMsg = '销毁代币失败，请重试';
                
                if (error.message) {
                    if (error.message.includes('Insufficient token balance')) {
                        errorMsg = '代币余额不足，需要8888枚代币';
                    } else if (error.message.includes('Insufficient token allowance')) {
                        errorMsg = '代币授权不足，请先授权智能合约使用代币';
                    } else if (error.message.includes('Token transfer to burn address failed')) {
                        errorMsg = '代币转移失败，请检查代币合约状态';
                    } else if (error.message.includes('User rejected the request')) {
                        errorMsg = '您取消了交易，请重试';
                    } else {
                        errorMsg += '\n错误信息: ' + error.message;
                    }
                }
                
                console.log('错误分析:', errorMsg);
                alert(errorMsg);
            }
        });

        // 第二步：铸造NFT
        mintAfterBurnBtn.addEventListener('click', async function() {
            if (!web3 || !contract || accounts.length === 0) {
                alert('请先连接钱包');
                return;
            }

            try {
                // 检查是否已销毁代币
                const hasBurned = await checkBurnStatus();
                if (!hasBurned) {
                    alert('请先销毁代币后再铸造NFT');
                    return;
                }
            } catch (error) {
                console.error('检查销毁状态失败:', error);
                alert('检查销毁状态失败，请刷新页面重试');
                return;
            }

            mintAfterBurnBtn.textContent = '铸造中...';
            mintAfterBurnBtn.disabled = true;

            // 设置合理的Gas价格和上限
            const gasPrice = await web3.eth.getGasPrice();
            const adjustedGasPrice = Math.floor(parseInt(gasPrice) * 1.2);
            const gasLimit = 2000000; // 2,000,000 gas
            
            console.log('当前网络Gas价格:', gasPrice, 'wei');
            console.log('调整后的Gas价格:', adjustedGasPrice, 'wei');
            
            // 显示铸造提示
            alert('即将开始铸造NFT\n\n请在MetaMask中确认铸造交易');
            
            console.log('正在铸造NFT...');
            
            // 调用智能合约铸造NFT
            console.log('开始调用mintBlessingCardAfterBurn()函数...');
            try {
                // 监听CardMinted事件，获取铸造的卡ID
                let mintedCardId = null;
                contract.events.CardMinted({ fromBlock: 'latest' }, (error, event) => {
                    if (!error && event && event.returnValues.owner === accounts[0]) {
                        mintedCardId = event.returnValues.cardId;
                        console.log('捕获到CardMinted事件，卡ID:', mintedCardId);
                    }
                });
                
                await contract.methods.mintBlessingCardAfterBurn().send({ 
                    from: accounts[0],
                    gasPrice: adjustedGasPrice,
                    gas: gasLimit
                });
                console.log('NFT铸造成功');
                
                // 获取铸造的卡信息
                // 先获取当前的nextCardId，然后减1得到刚铸造的卡ID
                const currentNextCardId = await contract.methods.nextCardId().call();
                const actualCardId = (parseInt(currentNextCardId) - 1).toString();
                console.log('计算得到的实际卡ID:', actualCardId);
                
                const cardInfo = await contract.methods.getCardInfo(actualCardId).call();
                
                // 显示成功弹窗
                mintSuccessModal.classList.remove('hidden');
                
                // 显示卡信息
                displayCardInfo(cardInfo);
                
                // 更新铸造状态
                await updateMintStatus();
                
                // 恢复按钮状态
                mintAfterBurnBtn.textContent = '第二步：铸造NFT';
                mintAfterBurnBtn.disabled = true;
            } catch (error) {
                console.error('NFT铸造失败:', error);
                // 显示详细的错误信息给用户
                let errorMessage = '铸造NFT失败';
                if (error.message) {
                    errorMessage += ': ' + error.message;
                } else if (error.reason) {
                    errorMessage += ': ' + error.reason;
                }
                alert(errorMessage);
                // 恢复按钮状态
                mintAfterBurnBtn.textContent = '第二步：铸造NFT';
                mintAfterBurnBtn.disabled = false;
                return;
            }
        });

        // 钱包连接后检查授权状态
        async function onWalletConnected() {
            await updateTokenBalance();
            await checkApprovalStatus();
            await updateMintStatus();
        }

        const originalConnectWallet = connectWallet;
        connectWallet = async function() {
            await originalConnectWallet();
            await onWalletConnected();
        };

            document.getElementById('cardName').textContent = cardData.name;
            document.getElementById('cardRarity').textContent = `稀有度: ${cardData.rarity}`;
            document.getElementById('cardDescription').textContent = cardData.description;
