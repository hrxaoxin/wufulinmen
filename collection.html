        // 智能合约地址
        const contractAddress = '0xF2C83d45A8Ed2769B8EEbDf4A82d76e53082e436'; // 代理合约地址

        // 全局变量
        let web3;
        let contract;
        let account;

        // DOM元素
        const fukaList = document.getElementById('fukaList');
        const synthesizeBtn = document.getElementById('synthesizeBtn');
        const wufuLinMenCard = document.getElementById('wufuLinMenCard');
        const noWuFuLinMen = document.getElementById('noWuFuLinMen');

        // 福卡描述
        const FUKA_DESCRIPTIONS = {
            '和谐福': '和睦相处，幸福美满',
            '友善福': '友善待人，福报常在',
            '富强福': '国富民强，繁荣昌盛',
            '爱国福': '爱我中华，福泽绵长',
            '敬业福': '敬业乐业，福禄安康',
            '万能福': '万福齐聚，好运临门',
            '五福临门': '五福齐聚，好运连连'
        };

        // 福卡类型枚举
        const BlessingType = {
            AiGuo: 0,      // 爱国福
            FuQiang: 1,    // 富强福
            HeXie: 2,      // 和谐福
            YouShan: 3,    // 友善福
            JingYe: 4,     // 敬业福
            WanNeng: 5,    // 万能福
            WuFuLinMen: 6  // 五福临门
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initWeb3().then(() => {
                loadFukaCounts();
                loadFukaList();
                checkWuFuLinMenStatus();
            });

            // 合成按钮点击事件
            synthesizeBtn.addEventListener('click', async function() {
                await synthesizeWuFuLinMen();
            });
        });

        // 初始化Web3
        async function initWeb3() {
            return new Promise((resolve, reject) => {
                if (typeof window.ethereum !== 'undefined') {
                    web3 = new Web3(window.ethereum);
                    try {
                        // 请求账户访问
                        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                        account = accounts[0];
                        
                        // 初始化合约
                        contract = new web3.eth.Contract(contractABI, contractAddress);
                        
                        console.log('钱包连接成功:', account);
                        resolve(account);
                    } catch (error) {
                        console.error('初始化Web3失败:', error);
                        resolve(null);
                    }
                } else {
                    alert('请安装MetaMask等Web3钱包插件');
                    resolve(null);
                }
            });
        }

        // 加载福卡数量
        async function loadFukaCounts() {
            try {
                if (!contract || !account) {
                    return;
                }
                
                // 获取用户持有的福卡类型
                const blessingTypes = await contract.methods.getAddressBlessingTypes(account).call();
                
                // 更新福卡数量
                updateFukaCount('爱国福', blessingTypes[BlessingType.AiGuo] ? 1 : 0);
                updateFukaCount('富强福', blessingTypes[BlessingType.FuQiang] ? 1 : 0);
                updateFukaCount('和谐福', blessingTypes[BlessingType.HeXie] ? 1 : 0);
                updateFukaCount('友善福', blessingTypes[BlessingType.YouShan] ? 1 : 0);
                updateFukaCount('敬业福', blessingTypes[BlessingType.JingYe] ? 1 : 0);
                updateFukaCount('万能福', blessingTypes[BlessingType.WanNeng] ? 1 : 0);
            } catch (error) {
                console.error('获取福卡数量失败:', error);
                // 默认显示0
                updateFukaCount('爱国福', 0);
                updateFukaCount('富强福', 0);
                updateFukaCount('和谐福', 0);
                updateFukaCount('友善福', 0);
                updateFukaCount('敬业福', 0);
                updateFukaCount('万能福', 0);
            }
        }

        // 更新单个福卡数量
        function updateFukaCount(fukaName, count) {
            const fukaElements = document.querySelectorAll('.bg-gradient-to-br.from-orange-100.to-orange-200');
            fukaElements.forEach(element => {
                const h3 = element.querySelector('h3');
                if (h3 && h3.textContent === fukaName) {
                    const countElement = element.querySelector('p');
                    if (countElement) {
                        countElement.textContent = `x${count}`;
                    }
                }
            });
        }

        // 加载福卡列表
        async function loadFukaList() {
            try {
                if (!contract || !account) {
                    return;
                }
                
                // 获取用户持有的福卡数量
                const balance = await contract.methods.balanceOf(account).call();
                
                // 清空列表
                fukaList.innerHTML = '';

                // 添加福卡
                for (let i = 0; i < balance; i++) {
                    const tokenId = await contract.methods.tokenOfOwnerByIndex(account, i).call();
                    const cardInfo = await contract.methods.cards(tokenId).call();
                    
                    let fukaName;
                    let fukaImage;
                    
                    switch (cardInfo.cardType) {
                        case '0':
                            fukaName = '爱国福';
                            fukaImage = 'aiguo.png';
                            break;
                        case '1':
                            fukaName = '富强福';
                            fukaImage = 'fuqiang.png';
                            break;
                        case '2':
                            fukaName = '和谐福';
                            fukaImage = 'hexie.png';
                            break;
                        case '3':
                            fukaName = '友善福';
                            fukaImage = 'youshan.png';
                            break;
                        case '4':
                            fukaName = '敬业福';
                            fukaImage = 'jingye.png';
                            break;
                        case '5':
                            fukaName = '万能福';
                            fukaImage = 'wanneng.png';
                            break;
                        case '6':
                            fukaName = '五福临门';
                            fukaImage = 'wufulinmen.png';
                            break;
                        default:
                            fukaName = '未知福卡';
                            fukaImage = 'wanneng.png';
                    }
                    
                    // 跳过五福临门，单独显示
                    if (cardInfo.cardType === '6') {
                        continue;
                    }
                    
                    const fukaCard = document.createElement('div');
                    fukaCard.className = 'border-2 border-orange-400 bg-orange-50 rounded-lg p-4 text-center';
                    fukaCard.innerHTML = `
                        <div class="w-24 h-24 mb-3 mx-auto">
                            <img src="images/fu-cards/${fukaImage}" alt="${fukaName}" class="w-full h-full object-contain">
                        </div>
                        <h3 class="text-lg font-semibold text-gray-800 mb-2">${fukaName}</h3>
                        <p class="text-gray-600">${FUKA_DESCRIPTIONS[fukaName]}</p>
                    `;
                    fukaList.appendChild(fukaCard);
                }

                // 更新标题中的数量
                const title = document.getElementById('fukaCountTitle');
                if (title) {
                    title.textContent = `我的福卡 (${balance})`;
                }
            } catch (error) {
                console.error('获取福卡列表失败:', error);
                // 清空列表
                fukaList.innerHTML = '';
                // 更新标题
                const title = document.querySelector('h2.text-lg.font-semibold');
                if (title) {
                    title.textContent = `我的福卡 (0)`;
                }
            }
        }

        // 检查五福临门状态
        async function checkWuFuLinMenStatus() {
            try {
                if (!contract || !account) {
                    return;
                }
                
                // 检查用户是否持有五福临门
                const hasWuFuLinMen = await contract.methods.hasBlessingType(account, BlessingType.WuFuLinMen).call();
                
                if (hasWuFuLinMen) {
                    // 显示五福临门福卡
                    wufuLinMenCard.classList.remove('hidden');
                    noWuFuLinMen.classList.add('hidden');
                } else {
                    // 显示未合成提示
                    wufuLinMenCard.classList.add('hidden');
                    noWuFuLinMen.classList.remove('hidden');
                }
            } catch (error) {
                console.error('检查五福临门状态失败:', error);
            }
        }

        // 合成五福临门
        async function synthesizeWuFuLinMen() {
            try {
                if (!contract || !account) {
                    alert('请先连接钱包');
                    return;
                }
                
                // 检查用户是否持有五福临门
                const hasWuFuLinMen = await contract.methods.hasBlessingType(account, BlessingType.WuFuLinMen).call();
                if (hasWuFuLinMen) {
                    alert('您已经持有五福临门，无需再次合成');
                    return;
                }
                
                // 获取用户持有的福卡类型
                const blessingTypes = await contract.methods.getAddressBlessingTypes(account).call();
                
                // 检查是否集齐五福
                const hasAiGuo = blessingTypes[BlessingType.AiGuo];
                const hasFuQiang = blessingTypes[BlessingType.FuQiang];
                const hasHeXie = blessingTypes[BlessingType.HeXie];
                const hasYouShan = blessingTypes[BlessingType.YouShan];
                const hasJingYe = blessingTypes[BlessingType.JingYe];
                
                if (!hasAiGuo || !hasFuQiang || !hasHeXie || !hasYouShan || !hasJingYe) {
                    alert('您还未集齐五福，请继续收集');
                    return;
                }
                
                // 确认合成
                if (!confirm('合成五福临门后，用于合成的5张福卡将被销毁，确定要继续吗？')) {
                    return;
                }
                
                // 显示合成中状态
                synthesizeBtn.textContent = '合成中...';
                synthesizeBtn.disabled = true;
                
                // 调用合成五福临门的功能
                await contract.methods.synthesizeWuFuLinMen().send({ from: account });
                
                alert('合成成功！您现在拥有五福临门，用于合成的福卡已被销毁');
                
                // 更新页面
                await checkWuFuLinMenStatus();
                await loadFukaCounts();
                await loadFukaList();
                
                // 恢复按钮状态
                synthesizeBtn.textContent = '合成五福临门';
                synthesizeBtn.disabled = false;
            } catch (error) {
                console.error('合成五福临门失败:', error);
                alert('合成失败，请稍后再试');
                synthesizeBtn.textContent = '合成五福临门';
                synthesizeBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
